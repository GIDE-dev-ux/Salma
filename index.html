<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>BABI-Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white h-screen w-screen overflow-hidden flex flex-col">

  <!-- Modern Header like your screenshot -->
  <div class="h-14 bg-gradient-to-r from-yellow-600 to-amber-600 flex items-center px-5 flex-shrink-0 z-10">
    <div class="flex-1">
      <h1 class="font-semibold text-xl">My Chatbot</h1>
      <p class="text-sm text-white/90 -mt-1">Ask me anything</p>
    </div>
    <div class="text-right">
      <div class="text-sm font-medium">BABI-Bot</div>
    </div>
  </div>

  <!-- Messages Area -->
  <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-8 bg-[#0a0a0a] scroll-smooth pb-32">
    <!-- Welcome message added by JS -->
  </div>

  <!-- Input Area - Modern style -->
  <div class="bg-[#111] border-t border-gray-800 p-4 flex-shrink-0 safe-area-bottom">
    <form id="chat-form" class="flex gap-3 items-center">
      <button type="button" class="w-11 h-11 bg-gradient-to-br from-pink-500 to-orange-500 rounded-full flex items-center justify-center text-xl flex-shrink-0">
        📎
      </button>
      
      <input 
        id="user-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        class="flex-1 bg-[#1f1f1f] border border-gray-700 focus:border-orange-500 rounded-full px-6 py-4 text-[17px] text-white placeholder-gray-400 focus:outline-none"
        placeholder="Type a message... or tap the paperclip"
      >
      
      <button 
        type="submit"
        id="send-btn"
        class="bg-gradient-to-r from-pink-500 to-orange-500 px-8 py-3.5 rounded-full font-medium active:scale-95 transition-all text-base"
      >
        Send
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
