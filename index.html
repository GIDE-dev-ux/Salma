<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BABI-Bot</title>

  <link rel="icon" href="/favicon.png"/>
  <link rel="stylesheet" href="style.css"/>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/highlight.min.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Chats</h3>
    <button id="newChatBtn">+ New Chat</button>
    <div id="chatList"></div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <div class="header">
  <img src="/favicon.png" class="logo"/>
  <h2>BABI-Bot</h2>

  <!-- Clear Chat Button -->
  <button id="clearChatBtn" title="Clear Chat">🗑️</button>
</div>

    <!-- CHAT -->
    <div class="chat-container">

      <!-- Messages -->
      <div class="messages" id="chatContainer"></div>

      <!-- INPUT -->
      <div class="input-area">

        <input
          type="text"
          id="userInput"
          placeholder="Ask anything..."
          autocomplete="off"
        />

        <button id="sendBtn">➤</button>

      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
  </html>
