<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>BABI-Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0a0a0a] text-white h-screen w-screen overflow-hidden flex flex-col">

  <!-- Simple Header - Only BABI-Bot -->
  <div class="h-12 bg-[#1a1a1a] flex items-center px-5 flex-shrink-0 z-10 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-pink-500 to-orange-500 flex items-center justify-center text-lg">
        ❤️
      </div>
      <div class="text-lg font-medium">BABI-Bot</div>
    </div>
  </div>

  <!-- Messages Area - Zoomed out with more space -->
  <div id="messages" class="flex-1 overflow-y-auto p-12 space-y-10 bg-[#0a0a0a] scroll-smooth pb-52">
    <!-- Welcome message added by JS -->
  </div>

  <!-- Input Area -->
  <div class="bg-[#111] border-t border-gray-800 p-4 flex-shrink-0 safe-area-bottom">
    <form id="chat-form" class="flex gap-3 items-center">
      <input 
        id="user-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        class="flex-1 bg-[#1f1f1f] border border-gray-700 focus:border-orange-500 rounded-full px-5 py-4 text-sm text-white placeholder-gray-400 focus:outline-none"
        placeholder="Message BABI-Bot..."
      >
      <button 
        type="submit"
        id="send-btn"
        class="bg-gradient-to-r from-orange-500 to-pink-600 hover:from-orange-600 hover:to-pink-700 px-7 py-3 rounded-full font-medium active:scale-95 text-sm min-w-[70px]"
      >
        Send
      </button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
